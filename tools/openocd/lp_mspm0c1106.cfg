# LP-MSPM0C1106 with its onboard XDS110, using OpenOCD's upstream mspm0 driver.
#
# Safety invariant: this file declares MAIN flash only. Do not replace it with
# target/ti/mspm0.cfg in normal development, because that upstream convenience
# configuration also declares NONMAIN and DATA flash banks.

adapter driver xds110
transport select swd
adapter speed 1000

set _CHIPNAME mspm0c1106
set _DAP_SWD_ID 0x2ba01477

swd newdap $_CHIPNAME cpu -expected-id $_DAP_SWD_ID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size 0x400 \
    -work-area-backup 0

flash bank $_CHIPNAME.main mspm0 0x00000000 0 0 0 $_TARGETNAME
cortex_m reset_config sysresetreq
